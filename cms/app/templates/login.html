<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHY Admin — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #f8f5f1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h1 {
            font-family: 'Playfair Display', serif;
            color: #b8704b;
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }
        .login-card .subtitle {
            color: #7a8b6f;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .error {
            background: #fde8e8;
            color: #c0392b;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #4a4543;
            margin-bottom: 0.3rem;
            font-size: 0.85rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #b8704b;
        }
        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: #b8704b;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
            font-family: inherit;
        }
        .btn-login:hover { background: #96583a; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>SHY Admin</h1>
        <p class="subtitle">Sandpoint Hot Yoga Content Manager</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/api/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
    </div>
</body>
</html>
